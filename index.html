<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="今日训练" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#111827" />
  <title>今日训练 · 8周下蹲抓</title>
  <style>
    :root{--bg:#0b1020;--card:rgba(255,255,255,.105);--card2:rgba(255,255,255,.07);--text:#f8fafc;--muted:#cbd5e1;--soft:#94a3b8;--line:rgba(255,255,255,.14);--accent:#fbbf24;--accent2:#fb7185;--green:#86efac;--blue:#93c5fd;--shadow:0 22px 55px rgba(0,0,0,.35);--radius:26px}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",Arial,sans-serif;color:var(--text);background:var(--bg)}
    body{padding:calc(18px + env(safe-area-inset-top)) 16px calc(26px + env(safe-area-inset-bottom));background:radial-gradient(circle at 15% 0%,rgba(251,191,36,.26),transparent 36%),radial-gradient(circle at 85% 8%,rgba(251,113,133,.23),transparent 34%),linear-gradient(160deg,#08111f 0%,#111827 55%,#18181b 100%)}
    .wrap{max-width:820px;margin:0 auto}.hero{padding:22px;border:1px solid var(--line);border-radius:34px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.06));box-shadow:var(--shadow);backdrop-filter:blur(24px);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-60px;top:-70px;width:190px;height:190px;border-radius:50%;background:rgba(251,191,36,.18);pointer-events:none}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px;position:relative;z-index:1}.badge{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.08);color:var(--muted);font-size:13px;backdrop-filter:blur(16px)}
    h1{font-size:32px;line-height:1.06;margin:0 0 8px;letter-spacing:-.04em;position:relative;z-index:1}.subtitle{margin:0;color:var(--muted);font-size:15px;line-height:1.45;position:relative;z-index:1}.controls{display:grid;grid-template-columns:1fr;gap:10px;margin:18px 0 14px;position:relative;z-index:1}.select{width:100%;appearance:none;border:1px solid var(--line);border-radius:18px;padding:13px 14px;background:rgba(255,255,255,.08);color:var(--text);font-weight:800;font-size:15px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tab{appearance:none;border:1px solid var(--line);border-radius:16px;padding:11px 8px;background:rgba(255,255,255,.07);color:var(--muted);font-weight:800}.tab.active{background:rgba(251,191,36,.20);color:#fff;border-color:rgba(251,191,36,.48)}
    .card{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);padding:18px;box-shadow:0 14px 35px rgba(0,0,0,.18);backdrop-filter:blur(20px);position:relative;z-index:1}.day-title{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}.day-title h2{font-size:22px;margin:0;letter-spacing:-.02em}.pill{white-space:nowrap;font-size:12px;color:#111827;background:linear-gradient(135deg,var(--accent),#fde68a);border-radius:999px;padding:6px 9px;font-weight:900}.note{color:var(--muted);font-size:14px;line-height:1.55;margin:8px 0 0}.list{display:grid;gap:10px;margin-top:14px}.item{display:grid;grid-template-columns:auto 1fr;gap:11px;padding:12px;border-radius:18px;background:var(--card2);border:1px solid rgba(255,255,255,.09)}.num{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:rgba(251,191,36,.18);color:#fde68a;font-weight:900;font-size:13px}.move{font-weight:800}.dose{margin-top:3px;color:var(--muted);font-size:14px;line-height:1.4}.tips{margin-top:14px;display:grid;gap:10px}.tip{padding:13px 14px;border-radius:18px;background:rgba(134,239,172,.09);border:1px solid rgba(134,239,172,.18);color:#dcfce7;font-size:14px;line-height:1.45}.tip.blue{background:rgba(147,197,253,.10);border-color:rgba(147,197,253,.18);color:#dbeafe}.footer{margin:16px 4px 0;color:var(--soft);font-size:12px;line-height:1.5;text-align:center}@media (min-width:680px){.hero{padding:30px}h1{font-size:42px}.controls{grid-template-columns:1fr 1.25fr}.tabs{margin:0}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="top"><span class="badge" id="dateText">今日训练</span><span class="badge">下蹲抓 · 8周</span></div>
      <h1 id="headline">今天练什么？</h1>
      <p class="subtitle" id="subline">计划从 2026年6月15日（下周一）开始。打开就能看当天安排，也可以手动切换周数。</p>
      <div class="controls">
        <select class="select" id="weekSelect" aria-label="选择周数"></select>
        <div class="tabs" role="tablist">
          <button class="tab" data-day="mon">周一</button><button class="tab" data-day="wed">周三</button><button class="tab" data-day="fri">周五</button><button class="tab" data-day="rest">休息</button>
        </div>
      </div>
      <article class="card" id="planCard"></article>
      <div class="tips"><div class="tip" id="weekTip"></div><div class="tip blue">糊糊今日原则：先站稳、再加重。锁握舒服就继续用，腿蹬起来，手别抢活。</div></div>
    </section>
    <p class="footer">保存到主屏幕后，它会像一个小 App 一样打开。所有内容都在这个 HTML 文件里。</p>
  </main>
  <script>
const weeks=[
{title:'第1周｜找节奏，稳住接杠',tip:'这一周别急着冲重量。目标是每次接杠都稳，蹲到底不慌。',mon:{name:'周一｜技术 + 过顶稳定',tag:'技术日',note:'重点：路线贴身、蹬腿、接杠稳。',items:[['PVC过顶深蹲','3×5'],['空杆下蹲抓','4×3'],['下蹲抓','6×2 @ 70%'],['高位抓拉','4×3 @ 中等'],['过顶深蹲','5×3 @ 轻中等'],['靠墙静蹲','3×45秒']]},wed:{name:'周三｜力量 + 腿',tag:'力量日',note:'深蹲先扎实，别练到腿完全废。',items:[['空杆前蹲','2×8'],['空杆过顶深蹲','3×5'],['深蹲','5×5 @ RPE 7'],['抓握硬拉','4×4 @ 稳'],['抓高拉','4×3'],['保加利亚分腿蹲','3×8/边'],['靠墙静蹲','3×60秒']]},fri:{name:'周五｜完整抓举 + 强度',tag:'强度日',note:'单次练质量，不为了数字硬顶。',items:[['空杆抓举技术','5分钟'],['下蹲抓','8×1 @ 75%'],['过顶深蹲','4×2 @ 中等'],['抓平衡','4×2'],['深蹲','4×3 @ RPE 7'],['靠墙静蹲','2×60秒']]}},
{title:'第2周｜小幅加量，保持成功率',tip:'比第1周略重一点，但成功率低于70%马上降重。',mon:{name:'周一｜技术 + 过顶稳定',tag:'技术日',note:'重点：从腿发力，手不要提前拉。',items:[['PVC过顶深蹲','3×5'],['空杆下蹲抓','4×3'],['下蹲抓','7×2 @ 72%-75%'],['高位抓拉','4×3 @ 稍重'],['过顶深蹲','5×3 @ 稳定重量'],['靠墙静蹲','3×50秒']]},wed:{name:'周三｜力量 + 腿',tag:'力量日',note:'深蹲维持动作，不要塌腰塌膝。',items:[['空杆前蹲','2×8'],['空杆过顶深蹲','3×5'],['深蹲','5×5 @ RPE 7-8'],['抓握硬拉','4×4 @ 比上周+2.5kg左右'],['抓高拉','4×3'],['保加利亚分腿蹲','3×8/边'],['靠墙静蹲','3×60秒']]},fri:{name:'周五｜完整抓举 + 强度',tag:'强度日',note:'重一点可以，但每把都要像样。',items:[['空杆抓举技术','5分钟'],['下蹲抓','9×1 @ 77%-80%'],['过顶深蹲','4×2 @ 中等偏重'],['抓平衡','4×2'],['深蹲','5×3 @ RPE 7-8'],['靠墙静蹲','2×60秒']]}},
{title:'第3周｜提高强度，练稳定',tip:'这周开始会更像训练。重点不是莽，是在更重重量下仍然稳定。',mon:{name:'周一｜技术 + 过顶稳定',tag:'技术日',note:'双次要稳，不要第一下好第二下乱。',items:[['PVC/空杆过顶深蹲','4×5'],['空杆下蹲抓','4×3'],['下蹲抓','6×2 @ 75%-78%'],['高位抓拉','5×3'],['过顶深蹲','5×3 @ 稍重'],['靠墙静蹲','3×60秒']]},wed:{name:'周三｜力量 + 腿',tag:'力量日',note:'力量日不要练成极限日，留一口气给周五。',items:[['空杆前蹲','2×8'],['过顶深蹲','3×5 @ 轻'],['深蹲','5×4 @ RPE 8'],['抓握硬拉','5×3 @ 稳重'],['抓高拉','5×3'],['保加利亚分腿蹲','3×8/边'],['靠墙静蹲','3×70秒']]},fri:{name:'周五｜完整抓举 + 强度',tag:'强度日',note:'允许上到有挑战，但失败不要连续超过2把。',items:[['空杆抓举技术','5分钟'],['下蹲抓','8×1 @ 80%-85%'],['过顶深蹲','5×2 @ 中重'],['抓平衡','4×2'],['深蹲','5×3 @ RPE 8'],['靠墙静蹲','2×70秒']]}},
{title:'第4周｜减量巩固，恢复一下',tip:'这是缓一口气的一周。动作做漂亮，身体恢复，下一阶段再冲。',mon:{name:'周一｜技术 + 过顶稳定',tag:'减量技术',note:'轻一点，把动作做得干净。',items:[['PVC过顶深蹲','3×5'],['空杆下蹲抓','5×2'],['下蹲抓','5×2 @ 65%-70%'],['高位抓拉','3×3 @ 轻中等'],['过顶深蹲','4×3 @ 轻'],['靠墙静蹲','2×45秒']]},wed:{name:'周三｜轻力量 + 活动',tag:'恢复力量',note:'腿保持感觉，不追疲劳。',items:[['髋踝活动','10分钟'],['空杆过顶深蹲','3×5'],['深蹲','4×4 @ RPE 6-7'],['抓握硬拉','3×3 @ 轻中等'],['抓高拉','3×3 @ 轻'],['靠墙静蹲','2×45秒']]},fri:{name:'周五｜轻强度 + 复盘',tag:'复盘日',note:'拍视频看接杠，不看重量。',items:[['空杆抓举技术','8分钟'],['下蹲抓','6×1 @ 70%-75%'],['过顶深蹲','3×2 @ 轻中等'],['抓平衡','3×2 @ 轻'],['深蹲','3×3 @ RPE 6-7'],['视频复盘','选2把看路线']]}},
{title:'第5周｜重新加重，冲到85%左右',tip:'减量后会感觉好一点。别被状态骗了，还是稳稳加。',mon:{name:'周一｜技术 + 过顶稳定',tag:'技术日',note:'目标是让75%-80%变得很普通。',items:[['PVC/空杆过顶深蹲','4×5'],['空杆下蹲抓','4×3'],['下蹲抓','6×2 @ 75%-80%'],['高位抓拉','5×3 @ 中重'],['过顶深蹲','5×3 @ 中重'],['靠墙静蹲','3×60秒']]},wed:{name:'周三｜力量 + 腿',tag:'力量日',note:'深蹲进入偏重，但动作不能散。',items:[['空杆前蹲','2×8'],['空杆过顶深蹲','3×5'],['深蹲','5×4 @ RPE 8'],['抓握硬拉','5×3 @ 重但稳'],['抓高拉','5×3'],['保加利亚分腿蹲','3×8/边'],['靠墙静蹲','3×75秒']]},fri:{name:'周五｜完整抓举 + 较重单次',tag:'强度日',note:'今天可以摸较重单次，但不做极限。',items:[['空杆抓举技术','5分钟'],['下蹲抓','6×1 @ 82%-85% + 2×1 @ 感觉好再加'],['过顶深蹲','5×2 @ 中重'],['抓平衡','4×2'],['深蹲','4×3 @ RPE 8'],['靠墙静蹲','2×75秒']]}},
{title:'第6周｜高强度适应',tip:'这周会有重感。睡眠、吃饭、恢复很重要。',mon:{name:'周一｜技术保质量',tag:'技术日',note:'不要把技术日练爆，给周五留状态。',items:[['PVC过顶深蹲','3×5'],['空杆下蹲抓','4×3'],['下蹲抓','5×2 @ 78%-82%'],['高位抓拉','5×2 @ 重'],['过顶深蹲','5×2 @ 中重'],['靠墙静蹲','3×60秒']]},wed:{name:'周三｜力量维持',tag:'力量日',note:'重但不硬顶，保持速度。',items:[['空杆前蹲','2×8'],['过顶深蹲','3×4 @ 轻'],['深蹲','5×3 @ RPE 8-8.5'],['抓握硬拉','5×3 @ 重'],['抓高拉','4×3'],['保加利亚分腿蹲','2×8/边'],['靠墙静蹲','2×75秒']]},fri:{name:'周五｜完整抓举重单',tag:'强度日',note:'单次目标：85%-90%，成功率优先。',items:[['空杆抓举技术','5分钟'],['下蹲抓','8×1 @ 85%-90%'],['过顶深蹲','4×2 @ 重但稳'],['抓平衡','4×1-2'],['深蹲','4×2 @ RPE 8'],['靠墙静蹲','2×60秒']]}},
{title:'第7周｜测试前准备',tip:'这周减少无用疲劳，保留爆发和信心。',mon:{name:'周一｜速度 + 技术',tag:'速度日',note:'每一把都要快，不要拖泥带水。',items:[['PVC/空杆过顶深蹲','4×5'],['空杆下蹲抓','4×2'],['下蹲抓','6×1 @ 75%-80%'],['高位抓拉','4×2 @ 中重'],['过顶深蹲','4×2 @ 稳'],['靠墙静蹲','2×60秒']]},wed:{name:'周三｜轻力量 + 保状态',tag:'减疲劳',note:'练完应该感觉更舒服，而不是更累。',items:[['髋踝活动','10分钟'],['空杆过顶深蹲','3×5'],['深蹲','3×3 @ RPE 6-7'],['抓握硬拉','3×2 @ 中等'],['抓高拉','3×2 @ 中等'],['靠墙静蹲','2×45秒']]},fri:{name:'周五｜模拟测试',tag:'模拟日',note:'最多摸到90%左右。今天不是必须破PR。',items:[['空杆抓举技术','8分钟'],['下蹲抓','逐步加重到 85%-90%，然后 3-5 把高质量单次'],['过顶深蹲','3×2 @ 轻中等'],['抓平衡','3×1 @ 轻'],['深蹲','2×2 @ 轻'],['视频复盘','记下最好的一把']]}},
{title:'第8周｜测试周，冲新PR',tip:'这一周少做多余辅助。热身充分，心态稳，能加再加。',mon:{name:'周一｜轻技术唤醒',tag:'轻技术',note:'找感觉，不制造疲劳。',items:[['PVC过顶深蹲','3×5'],['空杆下蹲抓','5×2'],['下蹲抓','5×1 @ 65%-75%'],['高位抓拉','3×2 @ 轻中等'],['过顶深蹲','3×2 @ 轻'],['靠墙静蹲','2×40秒']]},wed:{name:'周三｜短练保持',tag:'保状态',note:'练完应该想继续练，但停住。',items:[['髋踝肩活动','10分钟'],['空杆下蹲抓','4×2'],['下蹲抓','4×1 @ 70%-80%'],['深蹲','2×2 @ RPE 6'],['过顶深蹲','2×2 @ 轻'],['早睡吃饭','今天也算训练内容']]},fri:{name:'周五｜PR测试日',tag:'测试日',note:'建议按成功把逐步加：空杆 → 50% → 60% → 70% → 80% → 85% → 90% → 95% → 新PR。',items:[['热身活动','10-15分钟'],['空杆下蹲抓','5×2'],['下蹲抓热身','逐步加到 90%-95%'],['下蹲抓PR尝试','最多 3-5 次真正尝试'],['过顶深蹲','如状态好 2×2 轻重量'],['记录','写下成功重量、失败原因、最好一把感受']]}}
];
const rest={name:'今天不是主训练日',tag:'恢复日',note:'可以休息，也可以做轻量活动。别把恢复日练成加班日。',items:[['髋踝活动','10分钟'],['肩胸椎活动','10分钟'],['空杆技术','5-10分钟'],['抓举视频复盘','看 1-2 组'],['散步/睡觉/吃饭','认真恢复']]};
const now=new Date();document.getElementById('dateText').textContent=now.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});
const weekSelect=document.getElementById('weekSelect');weeks.forEach((w,i)=>{const opt=document.createElement('option');opt.value=i;opt.textContent=w.title;weekSelect.appendChild(opt)});
// 计划从下周一开始：2026-06-15
const planStart = new Date(2026, 5, 15); // 月份从 0 开始，5 = 6月
function autoWeek(){
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const start0 = new Date(planStart.getFullYear(), planStart.getMonth(), planStart.getDate());
  const diffDays = Math.floor((today0 - start0) / 86400000);
  if (diffDays < 0) return 0;
  const w = Math.floor(diffDays / 7);
  return Math.max(0, Math.min(7, w));
}
let currentWeek=Number(localStorage.getItem('snatchWeek')||autoWeek());
if(currentWeek<0||currentWeek>7)currentWeek=autoWeek();
weekSelect.value=currentWeek;
function defaultDay(){
  if (now < planStart) return 'mon';
  const d=now.getDay();return d===1?'mon':d===3?'wed':d===5?'fri':'rest'
}
let currentDay=defaultDay();
function render(){const w=weeks[currentWeek];const p=currentDay==='rest'?rest:w[currentDay];document.getElementById('headline').textContent=p.name;document.getElementById('weekTip').textContent=w.tip;document.getElementById('planCard').innerHTML=`<div class="day-title"><h2>${p.name}</h2><span class="pill">${p.tag}</span></div><p class="note">${p.note}</p><div class="list">${p.items.map((it,i)=>`<div class="item"><div class="num">${i+1}</div><div><div class="move">${it[0]}</div><div class="dose">${it[1]}</div></div></div>`).join('')}</div>`;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.day===currentDay));}
weekSelect.addEventListener('change',e=>{currentWeek=Number(e.target.value);localStorage.setItem('snatchWeek',String(currentWeek));render()});
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{currentDay=b.dataset.day;render()}));
render();
  </script>
</body>
</html>
